<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription - Quantum Trade</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0b1e3c,#0e2a5c);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:400px;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.logo span{
color:#4da3ff;
}

h1{
margin:10px 0;
font-size:28px;
}

.input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.3);
background:transparent;
color:white;
outline:none;
}

.check{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
margin:10px 0;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#3a7bd5,#3a5bd5);
color:white;
font-weight:bold;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.error{
color:#ff6b6b;
font-size:13px;
}

.success{
color:#00ffae;
text-align:center;
margin-top:10px;
}

a{
color:#4da3ff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">⚡ <span>Quantum Trade</span></div>

<h1>S'inscrire</h1>

<p>Déjà inscrit ? <a href="login.html">Se connecter</a></p>

<input type="email" id="email" class="input" placeholder="E-mail">
<div id="emailError" class="error"></div>

<input type="password" id="password" class="input" placeholder="Mot de passe">
<div id="passError" class="error"></div>

<input type="text" id="referral" class="input" placeholder="Code parrainage (optionnel)">

<div class="check">
<input type="checkbox" id="agree">
<label>J'accepte les conditions</label>
</div>
<div id="agreeError" class="error"></div>

<button class="btn" onclick="register()">S'INSCRIRE</button>

<div id="successMsg" class="success"></div>

</div>

<script>

const client = supabase.createClient(
"https://vapzbrnfkzuzyroebehh.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhcHpicm5ma3p1enlyb2ViZWhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDI2NjksImV4cCI6MjA5MTc3ODY2OX0.H3ieup8113Iz832VwbbYgXSAsR_MIXW8qYSsK1MSAwA"
);

function clearErrors(){
document.getElementById("emailError").innerText = "";
document.getElementById("passError").innerText = "";
document.getElementById("agreeError").innerText = "";
document.getElementById("successMsg").innerText = "";
}

async function register(){

clearErrors();

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();
let referral = document.getElementById("referral").value.trim();
let agree = document.getElementById("agree").checked;

let error = false;

/* VALIDATION */

if(email === ""){
document.getElementById("emailError").innerText = "Email obligatoire";
error = true;
}

if(password === ""){
document.getElementById("passError").innerText = "Mot de passe obligatoire";
error = true;
}

if(!agree){
document.getElementById("agreeError").innerText = "Vous devez accepter les conditions";
error = true;
}

if(error) return;

/* APPEL SUPABASE */

let { data, error: err } = await client.rpc("register_user", {
u_email: email,
u_password: password,
u_referral: referral
});

if(err){
console.log(err);
alert("Erreur serveur : " + err.message);
return;
}

/* REPONSE SQL */

if(data === "Compte créé"){
document.getElementById("successMsg").innerText = "Inscription réussie 🎉";

setTimeout(()=>{
window.location.href = "login.html";
},2000);

}else if(data === "exists"){
document.getElementById("emailError").innerText = "Email déjà utilisé";
}else{
alert(data);
}

}

</script>

</body>
</html>
